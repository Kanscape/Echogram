<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="scaffolded-by" content="https://github.com/schultek/jaspr">
        <meta name="color-scheme" content="light dark">

        <title>Echogram Web</title>
        <meta name="description" content="Echogram Web control surface">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="styles.css">
        <script>
            (function () {
                const media = window.matchMedia('(prefers-color-scheme: dark)');
                const applyTheme = () => {
                    document.documentElement.setAttribute('data-theme', media.matches ? 'dim' : 'corporate');
                };

                applyTheme();

                if (typeof media.addEventListener === 'function') {
                    media.addEventListener('change', applyTheme);
                } else if (typeof media.addListener === 'function') {
                    media.addListener(applyTheme);
                }
            })();
        </script>
        

        <!--
            Loads and runs the compiled 'main.client.dart' file,
            can be changed to any other '.client.dart' file inside /lib.
        -->
        <script defer src="main.client.dart.js"></script>
    </head>

        <!-- Your app component will be inserted here. -->
    </body>
</html>
